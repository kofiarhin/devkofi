name: Deploy client

on:
  push:
    branches: [master, main]
    paths:
      - "client/**"
      - ".github/workflows/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy_client:
    runs-on: ubuntu-latest
    environment: Production

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Build client
        working-directory: client
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: |
          npm ci
          npm run build

      - name: Upload dist to Namecheap (root public_html)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT }}
          protocol: ${{ secrets.FTP_PROTOCOL }}
          local-dir: client/dist/
          server-dir: /
          exclude: |
            **/.git*
            **/.github/**
            **/node_modules/**

  verify_live:
    runs-on: ubuntu-latest
    needs: [deploy_client]
    timeout-minutes: 5

    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Playwright & Chromium
        run: |
          npm init -y
          npm install -D @playwright/test
          npx playwright install --with-deps chromium

      - name: Create Playwright Config & Test
        run: |
          cat > playwright.config.js <<'EOF'
          import { defineConfig, devices } from '@playwright/test';

          export default defineConfig({
            testDir: '.',
            use: { trace: 'on-first-retry' },
            projects: [
              {
                name: 'chromium',
                use: { ...devices['Desktop Chrome'] },
              },
            ],
          });
          EOF

          cat > production.spec.js <<'EOF'
          import { test, expect } from '@playwright/test';

          test('devkofi.com returns 200', async ({ page }) => {
            const response = await page.goto('https://devkofi.com', {
              waitUntil: 'domcontentloaded',
              timeout: 30000,
            });

            console.log('Status Code:', response?.status());
            expect(response?.status()).toBe(200);
          });
          EOF

      - name: Run Playwright smoke test
        run: |
          npx playwright test production.spec.js --project=chromium --reporter=list
